name: Build and push Docker image

on:
  push:
    tags: ["*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check env docs
        run: python3 scripts/generate_env_docs.py --check
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.26"
      - name: Backend tests and lint
        run: cd backend && uv sync --frozen --group dev && uv run ruff check app tests && uv run pytest
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend unit tests and lint
        run: cd frontend && npm ci && npm run test && npm run lint
      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium
      - name: Frontend E2E smoke
        run: cd frontend && npm run test:e2e

  build-and-push:
    needs: test
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mirofish
          tags: |
            type=ref,event=tag
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
